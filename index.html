<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>La Parrilla Negra — Hamburguesas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   BASE & VARIABLES
═══════════════════════════════════════════ */
:root {
  --bg: #111010;
  --surface: #1c1b1a;
  --card: #242322;
  --border: #2e2c29;
  --accent: #e84c1e;
  --accent2: #f5a623;
  --text: #f2ede6;
  --muted: #7a7468;
  --green: #25d366;
  --white: #ffffff;
  --delivery-fee: 500;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
button,input,select,textarea{font-family:'Outfit',sans-serif;}
a{text-decoration:none;color:inherit;}

/* ═══════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════ */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ═══════════════════════════════════════════
   PAGE SYSTEM
═══════════════════════════════════════════ */
.page{display:none;}
.page.active{display:block;}

/* ═══════════════════════════════════════════
   ████████  MENU PAGE  ████████
═══════════════════════════════════════════ */

/* HERO */
.hero{
  position:relative;
  min-height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  padding:0 20px 32px;
  text-align:center;
  overflow:hidden;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(232,76,30,0.22) 0%, transparent 70%),
    repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,255,255,0.012) 40px,
      rgba(255,255,255,0.012) 41px
    );
}
.hero-grill{
  position:absolute;
  top:0;left:0;right:0;
  height:120px;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 12px,
      rgba(232,76,30,0.08) 12px,
      rgba(232,76,30,0.08) 13px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 30px,
      rgba(232,76,30,0.04) 30px,
      rgba(232,76,30,0.04) 31px
    );
}
.hero-logo{
  position:relative;
  z-index:2;
  margin-bottom:6px;
}
.hero-logo-icon{
  font-size:3.5rem;
  line-height:1;
  display:block;
  filter:drop-shadow(0 0 20px rgba(232,76,30,0.5));
  animation:flicker 4s ease-in-out infinite;
}
@keyframes flicker{
  0%,100%{filter:drop-shadow(0 0 20px rgba(232,76,30,0.5));}
  50%{filter:drop-shadow(0 0 35px rgba(232,76,30,0.8));}
}
.hero-name{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(2.8rem,10vw,4.2rem);
  letter-spacing:2px;
  line-height:0.9;
  position:relative;z-index:2;
  color:var(--text);
  text-shadow:0 2px 20px rgba(232,76,30,0.3);
}
.hero-sub{
  font-size:0.72rem;
  letter-spacing:4px;
  text-transform:uppercase;
  color:var(--accent2);
  position:relative;z-index:2;
  margin-top:6px;
  font-weight:500;
}

/* STATUS BAR */
.status-bar{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  padding:8px 16px;
  font-size:0.75rem;
  color:var(--muted);
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.status-dot{
  width:7px;height:7px;
  border-radius:50%;
  background:#4caf7d;
  flex-shrink:0;
  box-shadow:0 0 6px rgba(76,175,125,0.5);
  animation:statusPulse 2s infinite;
}
.status-dot.closed{background:#e84c1e;box-shadow:0 0 6px rgba(232,76,30,0.5);}
@keyframes statusPulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

/* CATEGORY STRIP */
.cat-strip{
  position:sticky;top:0;z-index:90;
  background:rgba(17,16,16,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.cat-tabs{
  display:flex;gap:4px;
  padding:10px 14px;
  overflow-x:auto;
  scrollbar-width:none;
}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-btn{
  flex-shrink:0;
  padding:7px 16px;
  border-radius:999px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-size:0.8rem;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
  white-space:nowrap;
  letter-spacing:0.3px;
}
.cat-btn.active{background:var(--accent);color:white;border-color:var(--accent);}
.cat-btn:hover:not(.active){color:var(--text);border-color:var(--muted);}

/* MENU SECTION */
.menu-content{padding:0 14px 120px;}

.menu-section{display:none;padding-top:20px;}
.menu-section.active{display:block;}

.section-header{
  display:flex;align-items:center;gap:10px;
  margin-bottom:16px;
}
.section-header h2{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;
  letter-spacing:1px;
  color:var(--text);
}
.section-header::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,var(--border),transparent);
}

/* BURGER CARDS */
.burger-grid{
  display:flex;flex-direction:column;gap:12px;
  margin-bottom:32px;
}

.burger-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color 0.2s,transform 0.15s;
  animation:cardIn 0.35s ease both;
  display:flex;
  align-items:stretch;
}
.burger-card:hover{border-color:rgba(232,76,30,0.4);transform:translateY(-2px);}
.burger-card.unavailable{opacity:0.4;pointer-events:none;}

@keyframes cardIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.burger-card:nth-child(1){animation-delay:0.05s;}
.burger-card:nth-child(2){animation-delay:0.1s;}
.burger-card:nth-child(3){animation-delay:0.15s;}
.burger-card:nth-child(4){animation-delay:0.2s;}

.burger-img{
  width:100px;
  min-height:100px;
  object-fit:cover;
  flex-shrink:0;
}
.burger-img-placeholder{
  width:100px;
  min-height:100px;
  background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;
  flex-shrink:0;
}
.burger-info{
  flex:1;padding:14px;
  display:flex;flex-direction:column;
  justify-content:space-between;
}
.burger-name{
  font-weight:700;font-size:0.95rem;
  margin-bottom:4px;
}
.burger-ingredients{
  font-size:0.73rem;
  color:var(--muted);
  line-height:1.5;
  flex:1;
  margin-bottom:8px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.burger-bottom{
  display:flex;align-items:center;justify-content:space-between;
}
.burger-price{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem;
  color:var(--accent2);
  letter-spacing:0.5px;
}
.add-btn{
  width:32px;height:32px;
  background:var(--accent);
  border:none;
  border-radius:8px;
  color:white;
  font-size:1.2rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform 0.15s,background 0.15s;
  flex-shrink:0;
}
.add-btn:hover{background:#c73d16;transform:scale(1.1);}
.badge-new{
  display:inline-block;
  background:var(--accent);
  color:white;
  font-size:0.6rem;
  font-weight:700;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:2px 6px;
  border-radius:4px;
  margin-left:6px;
  vertical-align:middle;
}
.badge-agotado{
  font-size:0.68rem;
  background:rgba(232,76,30,0.12);
  color:var(--accent);
  border:1px solid rgba(232,76,30,0.25);
  padding:3px 9px;border-radius:999px;
  font-weight:600;text-transform:uppercase;letter-spacing:0.5px;
}

/* HORARIOS CARD */
.horarios-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:20px;
  margin-bottom:32px;
}
.horarios-card h3{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;letter-spacing:1px;
  margin-bottom:14px;
  color:var(--text);
}
.horario-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;
  border-bottom:1px solid var(--border);
  font-size:0.83rem;
}
.horario-row:last-child{border:none;}
.horario-day{font-weight:600;}
.horario-time{color:var(--muted);}
.horario-time.open{color:#4caf7d;}
.horario-time.closed-day{color:var(--accent);}

/* CART FLOAT */
.cart-float{
  position:fixed;
  bottom:24px;left:16px;right:16px;
  background:var(--accent);
  border-radius:16px;
  padding:14px 20px;
  display:none;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  z-index:200;
  box-shadow:0 8px 32px rgba(232,76,30,0.4);
  animation:cartFloat 0.4s ease;
  transition:transform 0.2s;
}
.cart-float:hover{transform:translateY(-2px);}
.cart-float.visible{display:flex;}
@keyframes cartFloat{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.cart-badge{
  background:rgba(0,0,0,0.25);
  border-radius:8px;
  padding:4px 10px;
  font-size:0.8rem;
  font-weight:700;
}
.cart-total{font-weight:700;font-size:1rem;}
.cart-cta{font-size:0.82rem;font-weight:600;}

/* ═══════════════════════════════════════════
   ████████  CART / CHECKOUT PAGE  ████████
═══════════════════════════════════════════ */
.checkout-header{
  padding:20px 16px 0;
  display:flex;align-items:center;gap:12px;
}
.back-btn{
  width:38px;height:38px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  transition:background 0.15s;
  flex-shrink:0;
}
.back-btn:hover{background:var(--surface);}
.checkout-header h2{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.8rem;letter-spacing:1px;
}

.checkout-body{padding:16px;}

/* ORDER ITEMS */
.order-items{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  margin-bottom:16px;
}
.order-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.order-item:last-child{border:none;}
.order-item-img{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.order-item-ph{width:48px;height:48px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.order-item-name{flex:1;font-weight:600;font-size:0.88rem;}
.order-item-price{color:var(--accent2);font-weight:700;font-size:0.9rem;}
.qty-ctrl{display:flex;align-items:center;gap:8px;margin-right:8px;}
.qty-btn{
  width:26px;height:26px;
  background:var(--border);
  border:none;border-radius:6px;
  color:var(--text);cursor:pointer;
  font-size:0.9rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.qty-btn:hover{background:var(--accent);}
.qty-num{font-weight:700;font-size:0.88rem;min-width:16px;text-align:center;}

/* DELIVERY TOGGLE */
.delivery-toggle{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}
.delivery-toggle-title{font-weight:700;font-size:0.88rem;margin-bottom:12px;}
.mode-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mode-opt{
  padding:12px;
  border:2px solid var(--border);
  border-radius:12px;
  cursor:pointer;
  text-align:center;
  transition:all 0.2s;
}
.mode-opt.selected{border-color:var(--accent);background:rgba(232,76,30,0.08);}
.mode-opt-icon{font-size:1.5rem;display:block;margin-bottom:4px;}
.mode-opt-label{font-size:0.82rem;font-weight:600;}
.mode-opt-sub{font-size:0.7rem;color:var(--muted);margin-top:2px;}

/* DELIVERY FORM */
.delivery-form{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}
.form-title{font-weight:700;font-size:0.88rem;margin-bottom:14px;}
.form-group{margin-bottom:14px;}
.form-label{
  display:block;
  font-size:0.72rem;
  font-weight:600;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:6px;
}
.form-input{
  width:100%;
  padding:11px 14px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-size:0.9rem;
  outline:none;
  transition:border-color 0.2s;
}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--muted);}

/* MAP BTN */
.map-btn{
  display:flex;align-items:center;gap:8px;
  padding:11px 14px;
  background:var(--surface);
  border:1px dashed rgba(232,76,30,0.4);
  border-radius:10px;
  color:var(--accent);
  font-size:0.85rem;
  font-weight:600;
  cursor:pointer;
  width:100%;
  transition:background 0.2s;
}
.map-btn:hover{background:rgba(232,76,30,0.06);}
.map-preview{
  width:100%;
  height:160px;
  border-radius:10px;
  border:1px solid var(--border);
  overflow:hidden;
  margin-top:8px;
  display:none;
}
.map-preview.visible{display:block;}
.map-preview iframe{width:100%;height:100%;border:none;}

/* PAYMENT SECTION */
.payment-section{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
}
.payment-opts{display:flex;flex-direction:column;gap:8px;}
.pay-opt{
  display:flex;align-items:center;gap:12px;
  padding:12px;
  border:2px solid var(--border);
  border-radius:12px;
  cursor:pointer;
  transition:all 0.2s;
}
.pay-opt.selected{border-color:var(--accent);background:rgba(232,76,30,0.06);}
.pay-opt-radio{
  width:18px;height:18px;
  border-radius:50%;
  border:2px solid var(--border);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.pay-opt.selected .pay-opt-radio{border-color:var(--accent);background:var(--accent);}
.pay-opt.selected .pay-opt-radio::after{content:'';width:6px;height:6px;background:white;border-radius:50%;}
.pay-opt-info{flex:1;}
.pay-opt-label{font-weight:600;font-size:0.88rem;}
.pay-opt-sub{font-size:0.73rem;color:var(--muted);}
.pay-opt-icon{font-size:1.3rem;}

.cash-amount{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--border);
  display:none;
}
.cash-amount.visible{display:block;}
.vuelto-display{
  margin-top:8px;
  padding:10px 14px;
  background:rgba(245,166,35,0.1);
  border:1px solid rgba(245,166,35,0.25);
  border-radius:10px;
  font-size:0.83rem;
  color:var(--accent2);
  font-weight:600;
  display:none;
}
.vuelto-display.visible{display:block;}

/* ORDER SUMMARY */
.order-summary{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
  margin-bottom:20px;
}
.summary-row{
  display:flex;justify-content:space-between;
  padding:6px 0;
  font-size:0.85rem;
  color:var(--muted);
}
.summary-row.total{
  border-top:1px solid var(--border);
  margin-top:6px;
  padding-top:12px;
  font-weight:700;
  font-size:1rem;
  color:var(--text);
}
.summary-row.delivery-row{color:var(--accent);}

/* CONFIRM BTN */
.confirm-btn{
  width:100%;
  padding:16px;
  background:var(--green);
  border:none;
  border-radius:16px;
  color:white;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:transform 0.2s,background 0.2s;
  margin-bottom:32px;
}
.confirm-btn:hover{background:#1db954;transform:translateY(-2px);}
.confirm-btn svg{width:20px;height:20px;fill:white;}

/* ═══════════════════════════════════════════
   ████████  ADMIN LOGIN  ████████
═══════════════════════════════════════════ */
.login-page{
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  background:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(232,76,30,0.12) 0%, transparent 70%),
    var(--bg);
}
.login-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:36px 32px;
  width:100%;
  max-width:380px;
  animation:cardIn 0.4s ease;
}
.login-logo{
  text-align:center;
  margin-bottom:28px;
}
.login-logo-icon{font-size:2.5rem;display:block;margin-bottom:8px;}
.login-logo h2{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.8rem;letter-spacing:1px;
  color:var(--text);
}
.login-logo p{font-size:0.78rem;color:var(--muted);margin-top:2px;}
.login-error{
  background:rgba(232,76,30,0.1);
  border:1px solid rgba(232,76,30,0.3);
  border-radius:10px;
  padding:10px 14px;
  font-size:0.8rem;
  color:var(--accent);
  margin-bottom:12px;
  display:none;
}
.login-error.visible{display:block;}
.login-btn{
  width:100%;
  padding:13px;
  background:var(--accent);
  border:none;
  border-radius:12px;
  color:white;
  font-size:0.95rem;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
  transition:background 0.2s,transform 0.15s;
}
.login-btn:hover{background:#c73d16;transform:translateY(-1px);}
.login-link{
  text-align:center;
  margin-top:20px;
  font-size:0.78rem;
  color:var(--muted);
}
.login-link a{color:var(--accent);cursor:pointer;}

/* ═══════════════════════════════════════════
   ████████  ADMIN PANEL  ████████
═══════════════════════════════════════════ */
.admin-layout{display:flex;min-height:100vh;}

.admin-sidebar{
  width:220px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  position:fixed;top:0;left:0;bottom:0;
  display:flex;flex-direction:column;
  z-index:100;
}
.admin-sidebar-logo{
  padding:20px 16px;
  border-bottom:1px solid var(--border);
}
.admin-sidebar-logo .aname{
  font-family:'Bebas Neue',sans-serif;
  font-size:1.2rem;letter-spacing:1px;
  color:var(--text);
}
.admin-sidebar-logo .atag{
  font-size:0.68rem;
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:1.5px;
  margin-top:1px;
}
.admin-nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:2px;}
.anav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;
  border-radius:8px;
  color:var(--muted);
  font-size:0.83rem;
  font-weight:500;
  cursor:pointer;
  border:none;background:transparent;
  text-align:left;width:100%;
  transition:all 0.15s;
}
.anav-item:hover{color:var(--text);background:rgba(255,255,255,0.04);}
.anav-item.active{background:var(--accent);color:white;}
.anav-icon{font-size:1rem;width:18px;text-align:center;}
.admin-sidebar-footer{
  padding:12px 16px;
  border-top:1px solid var(--border);
}
.logout-btn{
